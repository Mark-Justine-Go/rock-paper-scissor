<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Rock Paper Scissor</title>
</head>
<body>
    <h1>Rock Paper Scissor</h1>
    <div class="container">
        <div class="result">
            <div id="humanResult"></div>
            <div id="computerResult"></div>
        </div>
        <div class="scores">
            <p id="humanScore">You: 0</p>
            <p id="computerScore">Computer: 0</p>
        </div>
        <div class="choices">
            <div id="rock"><img src="images/rock.png" alt="rock"></div>
            <div id="paper"><img src="images/paper.png" alt="paper"></div>
            <div id="scissor"><img src="images/scissor.png" alt="scissor"></div>
        </div>
    </div>
</body>
</html>
